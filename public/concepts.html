<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concepts — TCS IPA Prep</title>
  <meta name="description" content="Study structured theory and key notes for all 8 TCS IPA topics." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 900: '#0a0f1e' },
            brand: { DEFAULT: '#6366f1', dark: '#4f46e5', light: '#818cf8' },
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { background: #0a0f1e; font-family: 'Inter', sans-serif; margin: 0; }
    .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
    .gradient-text { background: linear-gradient(135deg, #6366f1, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .bg-grid { background-image: radial-gradient(rgba(99,102,241,0.07) 1px, transparent 1px); background-size: 32px 32px; }
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }

    /* Topic card */
    .topic-card {
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      cursor: pointer;
    }
    .topic-card:hover {
      transform: translateY(-5px);
      border-color: rgba(99,102,241,0.45) !important;
      box-shadow: 0 24px 48px rgba(99,102,241,0.15);
    }
    .topic-card:hover .card-arrow { transform: translateX(4px); }
    .card-arrow { transition: transform 0.2s ease; display: inline-block; }

    /* Progress bar on card */
    .progress-bar-track { background: rgba(255,255,255,0.06); border-radius: 999px; height: 4px; overflow: hidden; }
    .progress-bar-fill  { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #6366f1, #22d3ee); transition: width 0.6s ease; }

    /* Animations */
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

    /* Color accent variants */
    .accent-indigo .icon-box { background: rgba(99,102,241,0.15); }
    .accent-indigo .topic-tag { background: rgba(99,102,241,0.12); color: #a5b4fc; border-color: rgba(99,102,241,0.2); }
    .accent-purple .icon-box { background: rgba(168,85,247,0.15); }
    .accent-purple .topic-tag { background: rgba(168,85,247,0.12); color: #d8b4fe; border-color: rgba(168,85,247,0.2); }
    .accent-pink .icon-box { background: rgba(236,72,153,0.15); }
    .accent-pink .topic-tag { background: rgba(236,72,153,0.12); color: #f9a8d4; border-color: rgba(236,72,153,0.2); }
    .accent-yellow .icon-box { background: rgba(234,179,8,0.15); }
    .accent-yellow .topic-tag { background: rgba(234,179,8,0.12); color: #fde047; border-color: rgba(234,179,8,0.2); }
    .accent-orange .icon-box { background: rgba(249,115,22,0.15); }
    .accent-orange .topic-tag { background: rgba(249,115,22,0.12); color: #fdba74; border-color: rgba(249,115,22,0.2); }
    .accent-green .icon-box { background: rgba(34,197,94,0.15); }
    .accent-green .topic-tag { background: rgba(34,197,94,0.12); color: #86efac; border-color: rgba(34,197,94,0.2); }
    .accent-blue .icon-box { background: rgba(59,130,246,0.15); }
    .accent-blue .topic-tag { background: rgba(59,130,246,0.12); color: #93c5fd; border-color: rgba(59,130,246,0.2); }
    .accent-cyan .icon-box { background: rgba(6,182,212,0.15); }
    .accent-cyan .topic-tag { background: rgba(6,182,212,0.12); color: #67e8f9; border-color: rgba(6,182,212,0.2); }
  </style>
</head>
<body class="min-h-screen text-white bg-grid">

  <div class="orb w-[450px] h-[450px] bg-indigo-500 -top-24 -left-24 opacity-[0.09]"></div>
  <div class="orb w-80 h-80 bg-purple-600 bottom-0 right-0 opacity-[0.07]"></div>

  <!-- Nav -->
  <nav class="relative z-10 px-4 pt-6 flex items-center" style="animation: fadeIn 0.4s ease both;">
    <a href="/" class="glass rounded-xl px-3 py-2 text-sm text-slate-400 hover:text-white hover:border-indigo-500/40 transition flex items-center gap-1.5">
      ← Home
    </a>
  </nav>

  <!-- Header -->
  <header class="relative z-10 px-4 pt-8 pb-6 text-center" style="animation: slideUp 0.45s ease 0.05s both;">
    <div class="inline-flex items-center gap-2 glass rounded-full px-4 py-1.5 mb-6 text-sm text-indigo-300 font-medium">
      📖 Concepts Mode
    </div>
    <h1 class="text-4xl sm:text-5xl font-extrabold mb-3">
      Study <span class="gradient-text">Concepts</span>
    </h1>
    <p class="text-slate-400 text-base max-w-md mx-auto">
      Structured theory for each topic. Click any section to dive in.
    </p>

    <!-- Overall progress bar -->
    <div id="overallProgress" class="mt-8 max-w-sm mx-auto hidden">
      <div class="flex justify-between text-xs text-slate-500 mb-1.5">
        <span>Overall progress</span>
        <span id="progressLabel">0 / 8 topics started</span>
      </div>
      <div class="progress-bar-track">
        <div id="overallFill" class="progress-bar-fill" style="width:0%"></div>
      </div>
    </div>
  </header>

  <!-- Topic Grid -->
  <main class="relative z-10 max-w-6xl mx-auto px-4 pb-20">
    <p class="text-xs font-semibold uppercase tracking-widest text-slate-600 mb-6 text-center">Choose a topic</p>
    <div id="topicGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="glass rounded-2xl p-6 animate-pulse col-span-full text-center text-slate-600 py-20">Loading topics…</div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="relative z-10 text-center text-slate-600 text-xs pb-8">
    TCS IPA Prep Hub &copy; 2025 &bull; Concepts section
  </footer>

  <script src="/js/concepts.js"></script>
</body>
</html>
